<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartolina Digitale</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap');

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: linear-gradient(-45deg, #1e1e26, #0f0f13, #2a2a35, #0a0a0c);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Outfit', sans-serif; 
            color: #ffffff; 
            padding: 20px; 
        }

        .card { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 2rem; 
            border-radius: 25px; 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            text-align: center; 
            max-width: 50px; /* Larghezza contenuta per meglio adattarsi alle foto */
            width: 100%; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); 
        }

        .slider { 
            position: relative; 
            width: 100%; 
            margin-bottom: 20px;
            border-radius: 15px;
            overflow: hidden; /* Mantiene gli angoli arrotondati anche per le foto */
        }

        .slider img { 
            width: 100%; 
            height: auto; /* L'altezza si adatta alla larghezza, eliminando spazi vuoti */
            display: block;
            opacity: 0; 
            transition: opacity 0.8s ease-in-out; 
        }

        .slider img.active { 
            opacity: 1; 
        }

        h1 { font-weight: 600; margin-bottom: 15px; }
        .description { margin-bottom: 20px; color: rgba(255, 255, 255, 0.8); white-space: pre-line; }
        audio { width: 100%; margin-bottom: 20px; filter: invert(1) hue-rotate(180deg); }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .download-btn { display: block; background: #ffffff; color: #000; padding: 12px; border-radius: 50px; text-decoration: none; font-weight: 600; transition: 0.3s; }
        .download-btn:hover { background: #e0e0e0; transform: translateY(-3px); }
    </style>
</head>
<body>

    <div class="card">
        <div class="slider" id="slider"></div>
        <h1>D'Aria - Trent'anni</h1>
        <p class="description" id="description-text">Caricamento in corso...</p>

        <audio controls>
            <source src="audio.mp3" type="audio/mpeg">
        </audio>

        <div class="btn-group">
            <a href="audio.mp3" class="download-btn" download>📥 SCARICA AUDIO (MP3)</a>
        </div>
    </div>

    <script>
        fetch('descrizione.txt')
            .then(res => res.text())
            .then(text => document.getElementById('description-text').innerText = text)
            .catch(() => document.getElementById('description-text').innerText = "");

        const images = ['1.jpg', '2.jpg', '3.jpg']; 
        const slider = document.getElementById('slider');
        images.forEach((src, index) => {
            const img = document.createElement('img');
            img.src = 'immagini/' + src;
            if(index === 0) img.classList.add('active');
            slider.appendChild(img);
        });

        let current = 0;
        const slides = document.querySelectorAll('.slider img');
        function nextSlide() {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }
        if(slides.length > 0) setInterval(nextSlide, 3000);
    </script>
</body>
</html>
